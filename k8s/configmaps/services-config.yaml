apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: ngear-production
data:
  NODE_ENV: "production"
  PORT: "3001"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_DATABASE: "ngear_auth"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_DAYS: "7"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tenant-service-config
  namespace: ngear-production
data:
  NODE_ENV: "production"
  PORT: "3002"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_DATABASE: "ngear_tenant"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: ngear-production
data:
  NODE_ENV: "production"
  PORT: "3000"
  AUTH_SERVICE_URL: "http://auth-service:3001"
  TENANT_SERVICE_URL: "http://tenant-service:3002"
  USER_SERVICE_URL: "http://user-service:3003"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"