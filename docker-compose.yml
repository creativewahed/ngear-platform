version: '3.8'

services:
  # Database Services
  postgres:
    image: postgres:15-alpine
    container_name: ngear-postgres
    environment:
      POSTGRES_DB: ngear_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    container_name: ngear-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ngear_platform
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ngear-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Services
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: ngear-auth-service
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_NAME: ngear_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-for-development
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./services/auth-service/src:/app/src
    command: npm run start:dev

  # Frontend Applications
  platform-admin:
    build:
      context: .
      dockerfile: apps/platform-admin/Dockerfile
    container_name: ngear-platform-admin
    environment:
      NODE_ENV: development
      AUTH_SERVICE_URL: http://auth-service:3001
      TENANT_SERVICE_URL: http://tenant-service:3002
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
    volumes:
      - ./apps/platform-admin/src:/app/src
    command: npm run dev

  # API Gateway (Future)
  # api-gateway:
  #   build:
  #     context: .
  #     dockerfile: services/api-gateway/Dockerfile
  #   container_name: ngear-api-gateway
  #   ports:
  #     - "3100:3100"

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  default:
    name: ngear-network